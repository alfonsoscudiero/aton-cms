<div class="card">
  <div
    class="card-header d-flex justify-content-between align-items-center"
  >
    <h2>Marine Buoys</h2>

    <button
      class="btn btn-success"
      [routerLink]="['/buoys', 'new']"
    >
      Add New
    </button>
  </div>

  <div class="card-body">
    <aton-buoy-item
      *ngFor="let buoy of buoys"
      [buoy]="buoy">
    </aton-buoy-item>
  </div>
</div>
