<div class="card">
  <div class="card-header">
    <h3>{{ editMode ? 'Edit Buoy' : 'Add Buoy' }}</h3>
  </div>

  <div class="card-body">

    <form #f="ngForm" (ngSubmit)="onSubmit(f)">

      <div class="form-group mb-3">
        <label for="model">Buoy Model</label>
        <input
          type="text"
          id="model"
          class="form-control"
          name="model"
          [ngModel]="buoy?.model"
          required
          #model="ngModel">
      </div>

      <div class="form-group mb-3">
        <label for="type">Buoy Type</label>
        <input
          type="text"
          id="type"
          class="form-control"
          name="type"
          [ngModel]="buoy?.type"
          required
          #type="ngModel">
      </div>

      <div class="form-group mb-3">
        <label for="diameter">Diameter</label>
        <input
          type="text"
          id="diameter"
          class="form-control"
          name="diameter"
          [ngModel]="buoy?.diameter"
          required
          #diameter="ngModel">
      </div>

      <div class="form-group mb-3">
        <label for="overallHeight">Overall Height</label>
        <input
          type="text"
          id="overallHeight"
          class="form-control"
          name="overallHeight"
          [ngModel]="buoy?.overallHeight"
          required
          #overallHeight="ngModel">
      </div>

      <div class="form-group mb-3">
        <label for="datasheetUrl">Datasheet URL</label>
        <input
          type="text"
          id="datasheetUrl"
          class="form-control"
          name="datasheetUrl"
          [ngModel]="buoy?.datasheetUrl">
      </div>

      <div class="form-group mb-3">
        <label for="grossBuoyancy">Gross Buoyancy</label>
        <input
          type="text"
          id="grossBuoyancy"
          class="form-control"
          name="grossBuoyancy"
          [ngModel]="buoy?.grossBuoyancy">
      </div>

      <div class="form-group mb-3">
        <label for="focalPlaneHeight">Focal Plane Height</label>
        <input
          type="text"
          id="focalPlaneHeight"
          class="form-control"
          name="focalPlaneHeight"
          [ngModel]="buoy?.focalPlaneHeight">
      </div>

      <div
        class="alert alert-danger"
        *ngIf="!model.valid || !type.valid || !diameter.valid || !overallHeight.valid">
        Model, Type, Diameter, and Overall Height are required.
      </div>

      <button
        class="btn btn-success me-2"
        type="submit"
        [disabled]="!f.valid">
        Save
      </button>

      <button
        class="btn btn-danger"
        type="button"
        (click)="onCancel()">
        Cancel
      </button>

    </form>

  </div>
</div>
