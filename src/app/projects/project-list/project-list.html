<div class="card">
  <div
    class="card-header d-flex justify-content-between align-items-center"
  >
    <h2>Projects</h2>

    <button
      class="btn btn-success"
      [routerLink]="['/projects', 'new']"
    >
      Add New
    </button>
  </div>

  <div class="card-body">
    <aton-project-item
      *ngFor="let project of projects"
      [project]="project">
    </aton-project-item>
  </div>
</div>
