<div class="card">
  <div class="card-header">
    <h3>{{ editMode ? 'Edit Project' : 'Add Project' }}</h3>
  </div>

  <div class="card-body">

    <form #f="ngForm" (ngSubmit)="onSubmit(f)">

      <div class="form-group mb-3">
        <label for="name">Project Name</label>
        <input
          type="text"
          id="name"
          class="form-control"
          name="name"
          [ngModel]="project?.name"
          required
          #name="ngModel">
      </div>

      <div class="form-group mb-3">
        <label for="location">Location</label>
        <input
          type="text"
          id="location"
          class="form-control"
          name="location"
          [ngModel]="project?.location"
          required
          #location="ngModel">
      </div>

      <div class="form-group mb-3">
        <label for="country">Country</label>
        <input
          type="text"
          id="country"
          class="form-control"
          name="country"
          [ngModel]="project?.country"
          required
          #country="ngModel">
      </div>

      <div class="form-group mb-3">
        <label for="completionDate">Completion Date</label>
        <input
          type="text"
          id="completionDate"
          class="form-control"
          name="completionDate"
          [ngModel]="project?.completionDate"
          required
          #completionDate="ngModel">
      </div>

      <div class="form-group mb-3">
        <label for="description">Description</label>
        <textarea
          id="description"
          class="form-control"
          rows="4"
          name="description"
          [ngModel]="project?.description"
          required
          #description="ngModel">
        </textarea>
      </div>

      <div class="form-group mb-3">
        <label for="quoteNumber">Quote Number</label>
        <input
          type="text"
          id="quoteNumber"
          class="form-control"
          name="quoteNumber"
          [ngModel]="project?.quoteNumber">
      </div>

      <div class="form-group mb-3">
        <label for="lanternIds">Lantern IDs</label>
        <input
          type="text"
          id="lanternIds"
          class="form-control"
          name="lanternIds"
          [ngModel]="project?.lanternIds">
        <small class="text-muted">
          Enter IDs separated by commas (example: 1,3,5)
        </small>
      </div>

      <div class="form-group mb-3">
        <label for="buoyIds">Buoy IDs</label>
        <input
          type="text"
          id="buoyIds"
          class="form-control"
          name="buoyIds"
          [ngModel]="project?.buoyIds">
        <small class="text-muted">
          Enter IDs separated by commas (example: 2,4,6)
        </small>
      </div>

      <div
        class="alert alert-danger"
        *ngIf="!name.valid ||
              !location.valid ||
              !country.valid ||
              !completionDate.valid ||
              !description.valid">
        Project Name, Location, Country, Completion Date, and Description are required.
      </div>

      <button
        class="btn btn-success me-2"
        type="submit"
        [disabled]="!f.valid">
        Save
      </button>

      <button
        class="btn btn-danger"
        type="button"
        (click)="onCancel()">
        Cancel
      </button>

    </form>

  </div>
</div>
