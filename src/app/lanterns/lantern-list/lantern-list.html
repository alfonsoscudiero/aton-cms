<div class="card">

  <div class="card-header d-flex justify-content-between align-items-center">
    <h2>Marine Lanterns</h2>

    <button 
      class="btn btn-success"
      routerLink="/lanterns/new">
      Add New
    </button>
  </div>

  <div class="card-body">
    <aton-lantern-item
      *ngFor="let lantern of lanterns"
      [lantern]="lantern">
    </aton-lantern-item>
  </div>

</div>
