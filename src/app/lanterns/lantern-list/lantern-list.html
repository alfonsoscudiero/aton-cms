<div class="card">

  <div class="card-header d-flex justify-content-between align-items-center">
    <h2>Marine Lanterns</h2>

    <button 
      class="btn btn-success"
      routerLink="/lanterns/new">
      Add New
    </button>
  </div>

  <div class="card-body">

    <div
      *ngFor="let lantern of lanterns"
      class="lantern-row"
      [routerLink]="['/lanterns', lantern.id]"
      routerLinkActive="active">
      <p>{{ lantern.model }} - {{ lantern.type }}</p>
    </div>

  </div>

</div>
