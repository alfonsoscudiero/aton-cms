<div class="card">
  <div class="card-header">
    <h3>{{ editMode ? 'Edit Lantern' : 'Add Lantern' }}</h3>
  </div>

  <div class="card-body">

    <form #f="ngForm" (ngSubmit)="onSubmit(f)">

      <div class="form-group mb-3">
        <label for="model">Lantern Model</label>
        <input
          type="text"
          id="model"
          class="form-control"
          name="model"
          [ngModel]="lantern?.model"
          required
          #model="ngModel">
      </div>

      <div class="form-group mb-3">
        <label for="type">Lantern Type</label>
        <input
          type="text"
          id="type"
          class="form-control"
          name="type"
          [ngModel]="lantern?.type"
          required
          #type="ngModel">
      </div>

      <div class="form-group mb-3">
        <label for="datasheetUrl">Datasheet URL</label>
        <input
          type="text"
          id="datasheetUrl"
          class="form-control"
          name="datasheetUrl"
          [ngModel]="lantern?.datasheetUrl">
      </div>

      <div
        class="alert alert-danger"
        *ngIf="!model.valid || !type.valid">
        Lantern Model and Lantern Type are required.
      </div>

      <button
        class="btn btn-success me-2"
        type="submit"
        [disabled]="!f.valid">
        Save
      </button>

      <button
        class="btn btn-danger"
        type="button"
        (click)="onCancel()">
        Cancel
      </button>

    </form>

  </div>
</div>
